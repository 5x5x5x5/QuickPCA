# Documentation workflow: build the MkDocs site and deploy it to GitHub Pages.
#
# This uses the official actions/upload-pages-artifact + actions/deploy-pages
# pattern. Enable GitHub Pages for the repository with the "GitHub Actions"
# source (Settings -> Pages -> Build and deployment -> Source: GitHub Actions).
#
# The MkDocs configuration (mkdocs.yml) and the docs/ directory are provided
# separately; this workflow assumes they exist at the repository root.

name: Docs

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

# Allow only one concurrent deployment; skip queued runs in favor of the latest.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build MkDocs site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package with docs extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"

      - name: Build documentation
        run: mkdocs build --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write      # Required to deploy to GitHub Pages.
      id-token: write   # Required for the Pages deployment OIDC token.
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
