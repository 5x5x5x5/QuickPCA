name: Bug report
description: Report a problem with QuickPCA
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Commands, code, or inputs that trigger the issue.
      placeholder: |
        1. Run `quickpca run ...`
        2. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: QuickPCA version
      placeholder: "1.0.0"
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Python / OS / backend
      placeholder: "Python 3.11, Linux, numpy backend"
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs or traceback
      render: shell
